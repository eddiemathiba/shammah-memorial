<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Obituary | Shammah Funeral Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
        body { 
            font-family:'Inter',sans-serif; 
            background:#f8f5f2; 
            margin:0; 
            padding:40px; 
        }
        .form-container { 
            max-width:760px; 
            margin:auto; 
            background:white; 
            padding:50px; 
            border-radius:12px; 
            box-shadow:0 10px 40px rgba(0,0,0,0.1); 
        }
        h1 { 
            font-family:'Playfair Display',serif; 
            text-align:center; 
            color:#c8102e; 
        }
        label { display:block; margin:20px 0 8px; font-weight:500; color:#333; }
        input, textarea { width:100%; padding:14px; border:1px solid #ddd; border-radius:6px; font-size:1rem; }
        button { 
            background:#c8102e; 
            color:white; 
            padding:16px 50px; 
            border:none; 
            border-radius:50px; 
            font-size:1.15rem; 
            cursor:pointer; 
            margin-top:30px; 
            width:100%;
        }
        button:hover { background:#a00d24; }
        .back-link { text-align:center; margin-top:25px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Edit Obituary</h1>
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ obit.name }}" required>

            <label>Date of Birth</label>
            <input type="date" name="birth_date" value="{{ obit.birth_date }}" required>

            <label>Date of Death</label>
            <input type="date" name="death_date" value="{{ obit.death_date }}" required>

            <label>Funeral Date (optional)</label>
            <input type="date" name="funeral_date" value="{{ obit.funeral_date }}">

            <label>Photo URL</label>
            <input type="url" name="photo_url" value="{{ obit.photo_url }}">

            <label>Biography / Eulogy</label>
            <textarea name="biography" rows="7" required>{{ obit.biography }}</textarea>

            <label>Service / Programme Details</label>
            <textarea name="service_programme" rows="6">{{ obit.service_programme or '' }}</textarea>

            <button type="submit">Save Changes</button>
        </form>
        <div class="back-link">
            <a href="/admin" style="color:#c8102e;">← Cancel & Return to Manage Obituaries</a>
        </div>
    </div>
</body>
</html>
